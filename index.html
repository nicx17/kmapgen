<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMapGen - Karnaugh Map Generator & Logic Gate Visualizer</title>
    <meta
      name="description"
      content="Generate Karnaugh Maps, minimize boolean expressions with Quine-McCluskey, and visualize logic gate circuits in AND/OR, NAND-only, and NOR-only forms. Fully client-side, no data leaves your browser."
    />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="canonical" href="https://kmapgen.nicx.dev/" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KMapGen - Karnaugh Map Generator" />
    <meta
      property="og:description"
      content="Generate K-Maps, minimize boolean expressions, and visualize logic gate circuits. Fully client-side."
    />
    <meta property="og:url" content="https://kmapgen.nicx.dev/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="KMapGen - Karnaugh Map Generator" />
    <meta
      name="twitter:description"
      content="Generate K-Maps, minimize boolean expressions, and visualize logic gate circuits."
    />

    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">KMapGen</h1>
        <span class="app-subtitle">Karnaugh Map Generator & Logic Gate Visualizer</span>
      </div>
      <div class="header-right">
        <button
          id="theme-toggle"
          class="btn btn-icon"
          aria-label="Toggle theme"
          title="Toggle dark/light mode"
        >
          <svg
            id="theme-icon-dark"
            class="icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg
            id="theme-icon-light"
            class="icon hidden"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </header>

    <main class="app-main">
      <!-- Input Panel -->
      <section class="panel input-panel" id="input-panel">
        <h2 class="panel-title">Input Expression</h2>

        <div class="form-group">
          <label class="form-label">Number of Variables</label>
          <div class="segmented-control" id="var-count-selector">
            <button class="seg-btn" data-value="2">2</button>
            <button class="seg-btn active" data-value="3">3</button>
            <button class="seg-btn" data-value="4">4</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Expression Type</label>
          <div class="segmented-control" id="expr-type-selector">
            <button class="seg-btn active" data-value="sop">SOP (Minterms)</button>
            <button class="seg-btn" data-value="pos">POS (Maxterms)</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="minterms-input">
            <span id="terms-label">Minterms</span>
            <span class="form-hint" id="terms-hint">e.g. 1,3,4,6 or &Sigma;m(1,3,4,6)</span>
          </label>
          <input
            type="text"
            id="minterms-input"
            class="form-input mono"
            placeholder="1, 3, 4, 6"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="form-error hidden" id="minterms-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="dontcares-input">
            Don't Cares
            <span class="form-hint">Optional, e.g. 5,7</span>
          </label>
          <input
            type="text"
            id="dontcares-input"
            class="form-input mono"
            placeholder="5, 7"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="form-error hidden" id="dontcares-error"></div>
        </div>

        <button id="generate-btn" class="btn btn-primary">Generate</button>

        <div class="examples-section">
          <span class="form-label">Quick Examples</span>
          <div class="examples-grid" id="examples-grid"></div>
        </div>
      </section>

      <!-- Results Panel -->
      <section class="panel results-panel hidden" id="results-panel">
        <div class="results-header">
          <h2 class="panel-title">Results</h2>
          <div class="results-actions">
            <button id="export-png-btn" class="btn btn-sm" title="Export as PNG">
              <svg
                class="icon-sm"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              PNG
            </button>
            <button id="share-link-btn" class="btn btn-sm" title="Copy shareable link">
              <svg
                class="icon-sm"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
              </svg>
              Share
            </button>
          </div>
        </div>

        <!-- K-Map -->
        <div class="result-section" id="section-kmap">
          <h3 class="section-title">Karnaugh Map</h3>
          <div class="kmap-container" id="kmap-container"></div>
          <div class="kmap-legend" id="kmap-legend"></div>
        </div>

        <!-- Expression -->
        <div class="result-section" id="section-expression">
          <div class="expression-section" id="expression-section"></div>
        </div>

        <!-- Circuits -->
        <div class="result-section" id="section-circuits">
          <h3 class="section-title">Logic Circuit</h3>
          <div class="circuit-tabs">
            <div class="segmented-control" id="circuit-type-selector">
              <button class="seg-btn active" data-value="basic">Basic Gates</button>
              <button class="seg-btn" data-value="nand">NAND Only</button>
            </div>
          </div>
          <div class="circuit-container" id="circuit-container"></div>
          <div class="gate-stats" id="gate-stats"></div>
        </div>

        <!-- Truth Table -->
        <div class="result-section" id="section-truth-table">
          <h3 class="section-title">Truth Table</h3>
          <div class="table-container" id="truth-table-container"></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>
        &copy; 2026
        <a
          href="https://nickcardoso.com"
          target="_blank"
          rel="noopener noreferrer"
          style="color: inherit; text-decoration: underline; text-underline-offset: 2px"
          >Nick Cardoso</a
        >
        |
        <a
          href="https://github.com/nicx17/kmapgen"
          target="_blank"
          rel="noopener noreferrer"
          style="color: inherit; text-decoration: underline; text-underline-offset: 2px"
          >GitHub</a
        >
      </p>
    </footer>

    <!-- Toast for copy/share feedback -->
    <div class="toast hidden" id="toast"></div>
  </body>
</html>
